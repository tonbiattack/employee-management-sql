services:
  # PostgreSQL 検証用のコンテナ。
  # 元の schema.sql / data.sql を最も素直に流し込みやすい側として残している。
  postgres:
    image: postgres:16-alpine
    container_name: employee-management-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Postgres公式イメージの仕様:
      # /docker-entrypoint-initdb.d 配下の *.sql は「DBディレクトリが空の初回起動時」に自動実行される。
      # このため `docker compose up -d` だけで schema/data の投入まで完了する。
      # 既存データがある場合は再実行されない（再投入したい場合は `docker compose down -v` が必要）。
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
  # MySQL 検証用のコンテナ。
  # bootstrap-db.ps1 側で PostgreSQL 由来のSQLを変換して流し込む前提。
  mysql:
    image: mysql:8.4
    container_name: employee-management-mysql
    command:
      # 日本語データを扱うので、文字コードと照合順序は最初から utf8mb4 に寄せる。
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: employee
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pmysql"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql
      # MySQL公式イメージの仕様:
      # /docker-entrypoint-initdb.d 配下の *.sql は「/var/lib/mysql が未初期化の初回起動時」に自動実行される。
      # ここに 01-schema.sql / 02-data.sql を置くことで、コンテナ起動だけで初期投入が終わる。
      # volume が残っていると再実行されないため、初期化をやり直す場合は volume を削除する。
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro

volumes:
  # DB を再起動しても検証データを残せるよう、各DBごとに volume を分けている。
  postgres-data:
  mysql-data:
